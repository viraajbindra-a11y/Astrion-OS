name: Build Astrion OS Bootable ISO

on:
  workflow_dispatch:
    inputs:
      slim:
        description: 'Slim build (skip LibreOffice/Chromium/VLC/Ollama; lazy-install via App Store). Default off.'
        required: false
        default: 'true'
        type: boolean
  push:
    branches: [main]
    paths:
      - 'distro/**'

permissions:
  contents: write

jobs:
  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            debootstrap xorriso squashfs-tools \
            grub-pc-bin grub-efi-amd64-bin grub-common grub2-common \
            mtools dosfstools debian-archive-keyring

      - name: Build Astrion OS ISO
        env:
          # workflow_dispatch input wins; push events default to slim=true
          # (the demo path is the high-traffic one for now). Flip in the
          # UI when triggering manually if you want a fat build.
          ASTRION_SLIM: ${{ github.event.inputs.slim == 'false' && '0' || '1' }}
        run: |
          cd distro
          sudo --preserve-env=ASTRION_SLIM bash build.sh

      - name: Upload ISO (artifact — 30d retention, safety net)
        uses: actions/upload-artifact@v4
        with:
          name: nova-os-bootable-iso
          path: distro/output/nova-os.iso
          retention-days: 30
          if-no-files-found: error

      - name: Show ISO info
        run: |
          ls -lh distro/output/nova-os.iso
          echo "Astrion OS bootable ISO ready for download!"

      - name: Publish ISO to latest GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          # build.sh runs with sudo, so distro/output/* is root-owned.
          # This non-sudo step can't mv/rm those files without reclaiming ownership.
          # (Lesson #34 in tasks/lessons.md)
          sudo chown -R "$(whoami):$(whoami)" distro/output

          cd distro/output

          # Find the latest release FIRST so we can name the ISO to match it.
          # Reading version from the release tag instead of package.json avoids
          # a mismatch when the Electron build pipeline bumps package.json
          # independently of the git tag. (Lesson #35)
          LATEST_TAG=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 10 --json tagName,isDraft,isPrerelease \
            --jq 'map(select(.isDraft == false and .isPrerelease == false)) | .[0].tagName')

          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
            echo "::warning::No published release found — skipping release upload. Artifact is still available for 30 days."
            exit 0
          fi

          # Strip leading 'v' from tag: v0.1.95 -> 0.1.95
          VERSION="${LATEST_TAG#v}"
          echo "Latest release: $LATEST_TAG (version: $VERSION)"

          # Rename ISO with version + arch
          ASSET_NAME="astrion-os-${VERSION}-amd64.iso"
          mv nova-os.iso "$ASSET_NAME"

          # GitHub release assets cap at 2 GiB. Slim builds fit; full
          # builds (LibreOffice + Chromium + VLC + Ollama bundled) run
          # ~4 GiB and can't be attached to a release. Treat it as a
          # warning, not an error — the 30-day artifact uploaded in
          # the previous step is still downloadable from the run page,
          # so the build is usable even when the publish step skips.
          SIZE_BYTES=$(stat -c%s "$ASSET_NAME")
          MAX_BYTES=$((2 * 1024 * 1024 * 1024))
          if [ "$SIZE_BYTES" -gt "$MAX_BYTES" ]; then
            ARTIFACT_URL="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo "::warning::ISO is $SIZE_BYTES bytes (>2 GiB release asset limit) — skipping release upload. Download from artifacts: $ARTIFACT_URL"
            exit 0
          fi
          echo "ISO size OK: $SIZE_BYTES bytes"

          # Generate SHA256 checksum
          sha256sum "$ASSET_NAME" > "${ASSET_NAME}.sha256"
          cat "${ASSET_NAME}.sha256"

          echo "Uploading to release $LATEST_TAG"
          gh release upload "$LATEST_TAG" "$ASSET_NAME" "${ASSET_NAME}.sha256" --clobber --repo "$GITHUB_REPOSITORY"

          echo "Released: https://github.com/$GITHUB_REPOSITORY/releases/tag/$LATEST_TAG"
          echo "ISO: https://github.com/$GITHUB_REPOSITORY/releases/download/$LATEST_TAG/$ASSET_NAME"
          echo "Build commit: $GITHUB_SHA"
