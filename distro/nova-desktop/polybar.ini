; NOVA OS — Top Menubar (Polybar)
; This creates the menubar at the top of the screen

[colors]
background = #cc1e1e1e
foreground = #ffffff
foreground-alt = #888888
accent = #007aff
red = #ff5f57
yellow = #febc2e
green = #28c840

[bar/nova-bar]
monitor = ${env:MONITOR:}
width = 100%
height = 28
fixed-center = true
background = ${colors.background}
foreground = ${colors.foreground}
padding-left = 1
padding-right = 1
module-margin = 1
font-0 = Inter:size=11;3
font-1 = Inter:weight=bold:size=11;3
font-2 = JetBrains Mono:size=10;3

modules-left = nova-logo active-window
modules-center =
modules-right = network pulseaudio battery date

cursor-click = pointer
enable-ipc = true

; Override for a transparent look
override-redirect = false
wm-restack = openbox

[module/nova-logo]
type = custom/text
content = " ◆ NOVA"
content-font = 2
content-foreground = ${colors.accent}

[module/active-window]
type = internal/xwindow
label = %title:0:50:...%
label-foreground = ${colors.foreground-alt}

[module/date]
type = internal/date
interval = 1
date = %a, %b %d
time = %l:%M %p
label = %date%  %time%

[module/pulseaudio]
type = internal/pulseaudio
format-volume = VOL <label-volume>
label-volume = %percentage%%
label-muted = MUTED
label-muted-foreground = ${colors.foreground-alt}

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
format-charging = CHG <label-charging>
format-discharging = BAT <label-discharging>
label-full = 100%

[module/network]
type = internal/network
interface-type = wireless
format-connected = WiFi <label-connected>
label-connected = %essid%
format-disconnected = WiFi Off
label-disconnected-foreground = ${colors.foreground-alt}
