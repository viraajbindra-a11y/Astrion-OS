<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="sky" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#0b1a3d"/>
      <stop offset="60%" stop-color="#050a22"/>
      <stop offset="100%" stop-color="#020418"/>
    </radialGradient>
    <linearGradient id="aur1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ffa3" stop-opacity="0"/>
      <stop offset="40%" stop-color="#00ffa3" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0066ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aur2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b366ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7b5fff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#4b1e86" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="120" cy="180" r="1.2" opacity="0.8"/>
    <circle cx="340" cy="80" r="0.8" opacity="0.6"/>
    <circle cx="600" cy="220" r="1.4" opacity="0.9"/>
    <circle cx="820" cy="140" r="0.9" opacity="0.7"/>
    <circle cx="1040" cy="60" r="1.1" opacity="0.85"/>
    <circle cx="1280" cy="200" r="0.7" opacity="0.5"/>
    <circle cx="1500" cy="100" r="1.3" opacity="0.9"/>
    <circle cx="1720" cy="240" r="0.9" opacity="0.7"/>
    <circle cx="220" cy="320" r="0.6" opacity="0.4"/>
    <circle cx="460" cy="380" r="1.0" opacity="0.75"/>
    <circle cx="740" cy="360" r="0.8" opacity="0.6"/>
    <circle cx="1100" cy="420" r="1.2" opacity="0.85"/>
    <circle cx="1380" cy="340" r="0.7" opacity="0.5"/>
    <circle cx="1620" cy="380" r="1.1" opacity="0.8"/>
    <circle cx="1820" cy="440" r="0.9" opacity="0.7"/>
  </g>
  <!-- aurora -->
  <g filter="url(#blur)">
    <path d="M0 300 Q 480 180, 960 280 T 1920 260 L 1920 620 Q 1440 500, 960 580 T 0 560 Z" fill="url(#aur1)"/>
    <path d="M0 400 Q 480 260, 960 380 T 1920 340 L 1920 680 Q 1440 560, 960 640 T 0 620 Z" fill="url(#aur2)" opacity="0.7"/>
  </g>
  <!-- mountains -->
  <path d="M0 900 L 240 720 L 420 820 L 640 680 L 880 780 L 1100 700 L 1340 800 L 1560 720 L 1780 810 L 1920 740 L 1920 1080 L 0 1080 Z" fill="#050a22" opacity="0.95"/>
  <path d="M0 950 L 280 820 L 480 900 L 720 790 L 960 860 L 1200 810 L 1440 880 L 1680 820 L 1920 870 L 1920 1080 L 0 1080 Z" fill="#020418"/>
</svg>
