<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="geoBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1428"/>
      <stop offset="100%" stop-color="#1a2544"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007aff"/>
      <stop offset="100%" stop-color="#5856d6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff2d55"/>
      <stop offset="100%" stop-color="#ff9500"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34c759"/>
      <stop offset="100%" stop-color="#00c7be"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#geoBg)"/>

  <!-- large circles -->
  <circle cx="280" cy="220" r="180" fill="url(#g1)" opacity="0.85"/>
  <circle cx="1580" cy="860" r="220" fill="url(#g2)" opacity="0.75"/>
  <circle cx="1280" cy="180" r="120" fill="url(#g3)" opacity="0.8"/>

  <!-- triangles -->
  <polygon points="600,500 800,640 700,820" fill="url(#g2)" opacity="0.7"/>
  <polygon points="1100,420 1260,520 1180,640" fill="url(#g3)" opacity="0.6"/>
  <polygon points="150,700 340,780 220,880" fill="url(#g1)" opacity="0.65"/>

  <!-- rectangles -->
  <rect x="980" y="760" width="160" height="160" rx="20" fill="url(#g1)" opacity="0.75" transform="rotate(18 1060 840)"/>
  <rect x="480" y="80" width="120" height="120" rx="16" fill="url(#g3)" opacity="0.7" transform="rotate(-12 540 140)"/>

  <!-- lines / grid -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.06">
    <line x1="0" y1="180" x2="1920" y2="180"/>
    <line x1="0" y1="360" x2="1920" y2="360"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="720" x2="1920" y2="720"/>
    <line x1="0" y1="900" x2="1920" y2="900"/>
    <line x1="320" y1="0" x2="320" y2="1080"/>
    <line x1="640" y1="0" x2="640" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1280" y1="0" x2="1280" y2="1080"/>
    <line x1="1600" y1="0" x2="1600" y2="1080"/>
  </g>
</svg>
