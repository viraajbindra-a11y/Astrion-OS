<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="mtSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0520"/>
      <stop offset="45%" stop-color="#1b1142"/>
      <stop offset="75%" stop-color="#ff5e86"/>
      <stop offset="100%" stop-color="#ffb074"/>
    </linearGradient>
    <linearGradient id="mtBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1852"/>
      <stop offset="100%" stop-color="#4a2a6e"/>
    </linearGradient>
    <linearGradient id="mtMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0f38"/>
      <stop offset="100%" stop-color="#261758"/>
    </linearGradient>
    <linearGradient id="mtFore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#08041a"/>
      <stop offset="100%" stop-color="#100828"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#mtSky)"/>
  <!-- sun -->
  <circle cx="960" cy="780" r="80" fill="#ffe5c2" opacity="0.85"/>
  <circle cx="960" cy="780" r="140" fill="#ffb074" opacity="0.15"/>
  <!-- back mountains -->
  <path d="M0 720 L 180 540 L 320 620 L 480 480 L 640 600 L 820 500 L 980 580 L 1140 460 L 1300 560 L 1460 480 L 1620 580 L 1780 500 L 1920 560 L 1920 1080 L 0 1080 Z" fill="url(#mtBack)" opacity="0.8"/>
  <!-- mid mountains -->
  <path d="M0 820 L 160 680 L 300 740 L 460 620 L 620 720 L 800 640 L 960 720 L 1120 620 L 1280 700 L 1440 620 L 1600 720 L 1760 640 L 1920 700 L 1920 1080 L 0 1080 Z" fill="url(#mtMid)"/>
  <!-- front mountains -->
  <path d="M0 920 L 200 800 L 380 860 L 560 760 L 720 840 L 900 780 L 1060 860 L 1220 780 L 1380 860 L 1540 800 L 1720 860 L 1920 820 L 1920 1080 L 0 1080 Z" fill="url(#mtFore)"/>
  <!-- lake reflection -->
  <ellipse cx="960" cy="1020" rx="900" ry="12" fill="#ffb074" opacity="0.1"/>
</svg>
