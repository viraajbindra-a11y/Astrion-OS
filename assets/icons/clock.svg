<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="120" height="120" rx="26" fill="url(#cl1)"/>
  <!-- Clock face -->
  <circle cx="60" cy="60" r="32" fill="none" stroke="white" stroke-width="3"/>
  <!-- Hour markers -->
  <line x1="60" y1="32" x2="60" y2="36" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="84" x2="60" y2="88" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="60" x2="36" y2="60" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="84" y1="60" x2="88" y2="60" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Minor hour markers -->
  <circle cx="74" cy="36" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="84" cy="46" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="84" cy="74" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="74" cy="84" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="46" cy="84" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="36" cy="74" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="36" cy="46" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="46" cy="36" r="1.2" fill="white" opacity="0.6"/>
  <!-- Hour hand (pointing to ~10) -->
  <line x1="60" y1="60" x2="48" y2="40" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Minute hand (pointing to ~2) -->
  <line x1="60" y1="60" x2="76" y2="42" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="60" cy="60" r="2.5" fill="#f5a623"/>
  <!-- Second hand -->
  <line x1="60" y1="60" x2="60" y2="36" stroke="#f5a623" stroke-width="1" stroke-linecap="round"/>
  <defs>
    <linearGradient id="cl1" x1="0" y1="0" x2="120" y2="120"><stop stop-color="#333333"/><stop offset="1" stop-color="#111111"/></linearGradient>
  </defs>
</svg>